<div class="app-container" [ngClass]="{'no-sidebar': !authService.isLoggedIn()}">
  <aside class="sidebar glass-panel" *ngIf="authService.isLoggedIn()">
    <div class="logo">
      <h2>TheWallet</h2>
    </div>
    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/education" routerLinkActive="active">
        <span class="nav-icon">🎓</span> Education Hub
      </a>
      <a routerLink="/costs" routerLinkActive="active">
        <span class="nav-icon">🏠</span> Roommates
      </a>
      <a routerLink="/subscriptions" routerLinkActive="active">
        <span class="nav-icon">🔄</span> Subscriptions
      </a>
      <a routerLink="/budgets" routerLinkActive="active">
        <span class="nav-icon">💰</span> Budgets
      </a>
      <a routerLink="/settings" routerLinkActive="active">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </nav>
    <div class="user-profile">
      <button class="theme-toggle" (click)="toggleTheme()" style="background: transparent; border: 1px solid var(--surface-glass-border); color: var(--text-primary); padding: 8px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 12px;">
        {{ isDarkTheme ? '☀️ Light Mode' : '🌙 Dark Mode' }}
      </button>
      <div class="avatar">
        {{ (authService.currentUser$ | async)?.name?.charAt(0) || 'U' }}
      </div>
      <div class="user-email">{{ (authService.currentUser$ | async)?.email }}</div>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </aside>
  
  <main class="content-area">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Global AI Chatbot Widget -->
<app-chatbot *ngIf="authService.isLoggedIn()"></app-chatbot>
