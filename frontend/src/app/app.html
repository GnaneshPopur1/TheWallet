<div class="app-container" [ngClass]="{'no-sidebar': !authService.isLoggedIn()}">
  <aside class="sidebar glass-panel" *ngIf="authService.isLoggedIn()">
    <div class="logo">
      <h2>TheWallet</h2>
    </div>
    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/education" routerLinkActive="active">Education Hub</a>
      <a routerLink="/costs" routerLinkActive="active">Roommates</a>
      <a routerLink="/subscriptions" routerLinkActive="active">Subscriptions</a>
      <a routerLink="/budgets" routerLinkActive="active">Budgets</a>
    </nav>
    <div class="user-profile">
      <button class="theme-toggle" (click)="toggleTheme()" style="background: transparent; border: 1px solid var(--surface-glass-border); color: var(--text-primary); padding: 8px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 12px;">
        {{ isDarkTheme ? '☀️ Light Mode' : '🌙 Dark Mode' }}
      </button>
      <div class="avatar">
        {{ (authService.currentUser$ | async)?.name?.charAt(0) || 'U' }}  </div>
      <button class="btn-primary" routerLink="/login">Login</button>
    </div>
  </aside>
  
  <main class="content-area">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Global AI Chatbot Widget -->
<app-chatbot *ngIf="authService.isLoggedIn()"></app-chatbot>
