<aside class="landing-sidebar glass-panel">
  <div class="logo">
    <a routerLink="/" style="text-decoration: none; color: inherit;">
      <h2>TheWallet</h2>
    </a>
  </div>
  
  <nav class="nav-menu">
    <a routerLink="/" fragment="home" class="nav-link" [class.active]="activeSection === 'home'">
      <span class="nav-icon">🏠</span> Home
    </a>
    <a routerLink="/" fragment="features" class="nav-link" [class.active]="activeSection === 'features'">
      <span class="nav-icon">✨</span> Features
    </a>
    <a routerLink="/about" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <span class="nav-icon">📖</span> About Us
    </a>
  </nav>

  <div class="auth-buttons">
    <a routerLink="/login" class="btn btn-login w-100">Sign In</a>
    <a routerLink="/register" class="btn btn-signup w-100">Sign Up Free</a>
  </div>
</aside>
