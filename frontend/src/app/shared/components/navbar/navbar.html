<nav class="sleek-navbar" [ngClass]="{'scrolled': activeSection !== 'home'}">
  <div class="nav-container">
    <div class="logo">
      <a routerLink="/" style="text-decoration: none; color: inherit;">
        <h2>TheWallet</h2>
      </a>
    </div>
    
    <div class="nav-menu desktop-only">
      <a routerLink="/" fragment="home" class="nav-link" [class.active]="activeSection === 'home'">Home</a>
      <a routerLink="/" fragment="features" class="nav-link" [class.active]="activeSection === 'features'">Features</a>
      <a routerLink="/" fragment="about" class="nav-link" [class.active]="activeSection === 'about'">About</a>
    </div>

    <div class="auth-buttons desktop-only">
      <a routerLink="/login" class="btn btn-login">Sign In</a>
      <a routerLink="/register" class="btn btn-signup">Get Started</a>
    </div>

    <button class="mobile-toggle" (click)="toggleMobileMenu()">
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>

  <div class="mobile-menu" [ngClass]="{'open': isMobileMenuOpen}">
    <a routerLink="/" fragment="home" class="nav-link" (click)="toggleMobileMenu()">Home</a>
    <a routerLink="/" fragment="features" class="nav-link" (click)="toggleMobileMenu()">Features</a>
    <a routerLink="/" fragment="about" class="nav-link" (click)="toggleMobileMenu()">About</a>
    <div class="mobile-auth">
      <a routerLink="/login" class="btn btn-login w-100" (click)="toggleMobileMenu()">Sign In</a>
      <a routerLink="/register" class="btn btn-signup w-100" (click)="toggleMobileMenu()">Get Started</a>
    </div>
  </div>
