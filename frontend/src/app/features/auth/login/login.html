<div class="login-container">
  <div class="glass-panel login-card">
    <div class="login-header">
      <h2>Welcome to TheWallet</h2>
      <p>Log in to access your financial hub.</p>
    </div>
    
    <div *ngIf="errorMessage" class="error-msg">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          placeholder="test@college.edu"
          class="form-control" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="Enter your password"
          class="form-control" />
      </div>

      <button type="submit" class="btn-primary w-100" [disabled]="!loginForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Authenticating...</span>
      </button>

      <div class="auth-footer" style="margin-top: 1.5rem; text-align: center;">
        <p class="text-muted">Don't have an account? <a routerLink="/register" style="color: #4CAF50; text-decoration: none; font-weight: bold;">Sign up</a></p>
      </div>
    </form>
  </div>
</div>
