name: TheWallet CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm run install:all

    - name: Run Backend Tests & Prisma Validation
      run: |
        cd backend
        npx prisma validate

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Install Playwright Browsers
      run: |
        cd frontend
        npx playwright install --with-deps

    - name: Run Playwright E2E Tests
      run: |
        cd frontend
        npx playwright test
