version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thewallet-backend
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me}
      - CORS_ORIGIN=http://localhost
      - PUBLIC_API_URL=http://localhost:3000
      - PORT=3000
    volumes:
      - backend-data:/app/data
    command: sh -c "mkdir -p /app/data && touch /app/data/dev.db && npx prisma migrate deploy && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thewallet-frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  backend-data:
